"$schema" = "node_modules/wrangler/config-schema.json"

name = "diceshock-behover"
compatibility_date = "2025-09-24"
main = "./src/main.tsx"
compatibility_flags = ["nodejs_compat"]
account_id = "3244c8f91cd34317ce18652158e5853a"
workers_dev = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[version_metadata]
binding = "CF_VERSION_METADATA"

[[kv_namespaces]]
binding = "KV"
id = "59911665c0654c54814d81fbb213aae4"

[[d1_databases]]
binding = "DB"
database_name = "diceshock"
database_id = "24c01d5e-c4d7-4b13-bb59-5ad3373971e9"
migrations_dir = "../../drizzle"

[[d1_databases]]
binding = "GSTONE_DB"
database_name = "gstone-games"
database_id = "fbe99ba3-8b12-4bf6-ab4b-93031a0f95a2"

[[r2_buckets]]
binding = "R2"
bucket_name = "diceshock"
preview_bucket_name = "diceshock-preview"

[[r2_buckets]]
binding = "RAW_FEED"
bucket_name = "ds-raw-feed"

[[r2_buckets]]
binding = "LIBRARY"
bucket_name = "ds-library"

[[durable_objects.bindings]]
name = "DS_SUBSCRIPTION"
class_name = "DsSubscriptionDO"

[[durable_objects.bindings]]
name = "PUBSUB"
class_name = "PubSubDO"

[[durable_objects.bindings]]
name = "WECHAT_AGENT"
class_name = "WechatAgentDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SeatTimerDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SocketDO"]
deleted_classes = ["SeatTimerDO"]

[[migrations]]
tag = "v3"
new_classes = ["PubSubDO"]

[[migrations]]
tag = "v4"
renamed_classes = [{ from = "SocketDO", to = "DsSubscriptionDO" }]

[[migrations]]
tag = "v5"
new_classes = ["WechatAgentDO"]

[browser]
binding = "BROWSER"

[[queues.producers]]
binding = "IMAGE_QUEUE"
queue = "diceshock-image-processing"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "diceshock-notifications"

[[queues.producers]]
binding = "GSTONE_CRAWL_QUEUE"
queue = "diceshock-gstone-crawl"

[[queues.producers]]
binding = "GSTONE_IMAGE_QUEUE"
queue = "diceshock-gstone-images"

[[queues.producers]]
binding = "GSTONE_DOC_CRAWL_QUEUE"
queue = "diceshock-gstone-doc-crawl"

[[queues.producers]]
binding = "GSTONE_OCR_QUEUE"
queue = "diceshock-gstone-ocr"

[[queues.producers]]
binding = "GSTONE_DOC_IMAGE_QUEUE"
queue = "diceshock-gstone-doc-images"

[[queues.consumers]]
queue = "diceshock-image-processing"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 2

[[queues.consumers]]
queue = "diceshock-notifications"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[[queues.consumers]]
queue = "diceshock-gstone-crawl"
max_batch_size = 1
max_batch_timeout = 3
max_retries = 3
max_concurrency = 1

[[queues.consumers]]
queue = "diceshock-gstone-images"
max_batch_size = 1
max_batch_timeout = 3
max_retries = 3
max_concurrency = 1

[[queues.consumers]]
queue = "diceshock-gstone-doc-crawl"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
max_concurrency = 1

[[queues.consumers]]
queue = "diceshock-gstone-ocr"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
max_concurrency = 10

[[queues.consumers]]
queue = "diceshock-gstone-doc-images"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
max_concurrency = 1

[[routes]]
pattern = "origin.runespark.fun"
custom_domain = true

[triggers]
crons = ["*/5 * * * *", "0 4-22 * * *", "0 16 * * *"]

[vars]
AUTH_URL = "https://diceshock.com"
CAPTCHA_PREFIX = "1bqoki"
CAPTCHA_SCENE_ID = "1iwji8e9"

# AI Search instance
[[ai_search]]
binding = "AI_SEARCH"
instance_name = "nameless-resonance-0d56"
remote = true

# Workers AI (embeddings, etc.)
[ai]
binding = "AI"
remote = true

# Secrets (set via `wrangler secret put`):
# WECHAT_OPEN_APP_ID
# WECHAT_OPEN_APP_SECRET
# WECHAT_MP_APP_ID
# WECHAT_MP_APP_SECRET
# WECHAT_MP_TOKEN              — 服务号消息验签 Token
# WECHAT_MP_ENCODING_AES_KEY   — 消息加解密密钥
# DEEPSEEK_API_KEY             — DeepSeek V4 Flash API Key
# CF_AI_GATEWAY_ID             — AI Gateway ID
