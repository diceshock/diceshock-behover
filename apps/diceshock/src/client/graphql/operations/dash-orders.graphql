query Orders($input: OrderListInput = {}, $filter: OrderFilterInput) {
  orders(input: $input, filter: $filter) {
    items {
      id
      tableId
      userId
      tempId
      nickname
      uid
      phone
      seats
      status
      startAt
      endAt
      finalPrice
      finalPoints
      settledPrice
      settledPoints
      pricingSnapshotId
      table {
        id
        name
        code
        scope
      }
    }
    pageInfo {
      offset
      limit
      total
      nextCursor
      hasMore
    }
  }
}

query Order($id: ID!) {
  order(id: $id) {
    id
    tableId
    userId
    tempId
    nickname
    uid
    phone
    seats
    status
    startAt
    endAt
    finalPrice
    finalPoints
    settledPrice
    settledPoints
    pricingSnapshotId
    priceBreakdown
    settlementSnapshot
    table {
      id
      name
      code
      scope
    }
    user {
      id
      uid
      name
      nickname
      role
    }
  }
}

query SettlementPreview($id: ID!) {
  settlementPreview(id: $id) {
    order {
      id
      tableId
      userId
      tempId
      nickname
      uid
      status
      startAt
      endAt
      finalPrice
      finalPoints
      settledPrice
      settledPoints
      settlementSnapshot
      table {
        id
        name
        code
        scope
      }
    }
    totalMinutes
    pausedMinutes
    billableMinutes
    finalPrice
    finalPoints
    priceBreakdown {
      planName
      planType
      billingType
      unitPrice
      unitPoints
      totalMinutes
      billableHalfHours
      rawPrice
      rawPoints
      capApplied
      capType
      finalPrice
      finalPoints
    }
    membership {
      hasTimePlan
      timePlanActive
      timePlanType
      timePlanEndDate
      storedValueBalance
      pointsBalance
    }
    pauseLogs {
      pausedAt
      resumedAt
    }
    pricingPlans {
      name
      planType
      billingType
      price
      points
      matched
    }
    recentOrders {
      id
      tableName
      startAt
      endAt
      finalPrice
      status
    }
  }
}

