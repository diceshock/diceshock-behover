  batchSettlementPreview(ids: $ids) {
    order {
      id
      tableId
      userId
      tempId
      nickname
      uid
      status
      startAt
      endAt
      finalPrice
      finalPoints
      settledPrice
      settledPoints
      settlementSnapshot
      table {
        id
        name
        code
        scope
      }
    }
    totalMinutes
    pausedMinutes
    billableMinutes
    finalPrice
    finalPoints
    priceBreakdown {
      planName
      planType
      billingType
      unitPrice
      unitPoints
      totalMinutes
      billableHalfHours
      rawPrice
      rawPoints
      capApplied
      capType
      finalPrice
      finalPoints
    }
    membership {
      hasTimePlan
      timePlanActive
      timePlanType
      timePlanEndDate
      storedValueBalance
      pointsBalance
    }
    pauseLogs {
      pausedAt
      resumedAt
    }
    pricingPlans {
      name
      planType
      billingType
      price
      points
      matched
    }
    recentOrders {
      id
      tableName
      startAt
      endAt
      finalPrice
      status
    }
  }
}

mutation PauseOrder($id: ID!) {
  pauseOrder(id: $id) {
    id
    status
  }
}

mutation ResumeOrder($id: ID!) {
  resumeOrder(id: $id) {
    id
    status
  }
}

mutation EndOrder($id: ID!) {
  endOrder(id: $id) {
    id
    status
    endAt
  }
}

mutation SettleOrder($input: SettleOrderInput!) {
  settleOrder(input: $input) {
    order {
      id
      status
      finalPrice
      finalPoints
      settledPrice
      settledPoints
    }
    price
    points
    snapshot
    storedValueDeduction {
      deducted
      amount
      note
      balanceBefore
      balanceAfter
    }
    pointsDeduction {
      deducted
      amount
      note
      balanceBefore
      balanceAfter
    }
  }
}

mutation BatchSettleOrders($input: BatchSettleInput!) {
  batchSettleOrders(input: $input) {
    batchId
    results {
      id
      success
      price
      restored
      error
    }
  }
}

mutation CancelBatchSettlement($ids: [ID!]!) {
  cancelBatchSettlement(ids: $ids) {
    id
    success
    restored
    error
  }
}

mutation BatchPauseOrders($ids: [ID!]!) {
  batchPauseOrders(ids: $ids) {
    id
    success
    error
  }
}

mutation BatchResumeOrders($ids: [ID!]!) {
  batchResumeOrders(ids: $ids) {
    id
    success
    error
  }
}

query PublishedPricing($storeId: ID) {
  publishedPricing(storeId: $storeId) {
    id
    data {
      config {
        daytimeStart
        daytimeEnd
      }
      plans
    }
  }
}

subscription OrderStatusChanged($orderId: ID, $tableId: ID, $storeId: ID) {
  orderStatusChanged(orderId: $orderId, tableId: $tableId, storeId: $storeId) {
    order {
      id
      tableId
      userId
      tempId
      nickname
      uid
      phone
      seats
      status
      startAt
      endAt
      finalPrice
      table {
        id
        name
        code
        scope
      }
    }
    previousStatus
    currentStatus
    updatedAt
  }
}
