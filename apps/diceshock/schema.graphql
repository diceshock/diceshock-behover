# Diceshock custom GraphQL schema extensions.
# DateTime values are ISO 8601 strings. JSON fields are JSON-encoded strings.

# ─── Shared ────────────────────────────────────────────────────────────────

type Query
type Mutation
type Subscription

input PaginationInput {
  offset: Int = 0
  limit: Int = 20
}

input CursorPaginationInput {
  cursor: String
  limit: Int = 20
}

type PageInfo {
  offset: Int!
  limit: Int!
  total: Int
  nextCursor: String
  hasMore: Boolean!
}

type OperationResult {
  success: Boolean!
  message: String
}

type BatchOperationResult {
  id: ID!
  success: Boolean!
  error: String
}

enum StoreCode {
  gg
  jdk
}

enum SortOrder {
  ASC
  DESC
}

# ─── Core Custom Rows ──────────────────────────────────────────────────────

enum UserRole {
  CUSTOMER
  STAFF
  ADMIN
}

type Store {
  id: ID!
  code: StoreCode
  name: String!
  address: String
  isActive: Boolean!
  createdAt: String
}

type UserProfile {
  id: ID!
  uid: String
  name: String
  email: String
  image: String
  role: UserRole!
  nickname: String
  phone: String
  preferredLocale: String
  preferredStoreId: ID
  meta: String
  createdAt: String
  membershipPlans: [MembershipPlan!]!
}

type BoardGameSummary {
  id: ID!
  schName: String
  engName: String
  gstoneId: Int
  gstoneRating: Float
  category: String
  mode: String
  playerNum: String
  bestPlayerNum: String
  content: String
  removeDate: String
}

type BoardGameCounts {
  current: Int!
  removed: Int!
  latestDate: String
}

input BoardGameFilterInput {
  searchWords: String
  numOfPlayers: Int
  isBestNumOfPlayers: Boolean = false
  tags: [String!] = []
  pagination: PaginationInput = { offset: 0, limit: 20 }
}

# ─── Auth ──────────────────────────────────────────────────────────────────

type SmsCodeResult {
  success: Boolean!
  message: String
  expiresInMs: Int
}

type UserInfoUpdateResult {
  success: Boolean!
  message: String
  user: UserProfile
}

type TotpSecretResult {
  success: Boolean!
  message: String
  secret: String
}

type TotpVerificationResult {
  success: Boolean!
  message: String
  userId: ID
}

input RequestSmsCodeInput {
  phone: String!
  botcheck: String
}

input UpdateMyUserInfoInput {
  nickname: String
  phone: String
  code: String
}

input VerifyTotpInput {
  totp: String!
  userAgent: String!
  loginTime: Float!
}

extend type Query {
  getTotpSecret: TotpSecretResult! # @auth(role: CUSTOMER)
}

extend type Mutation {
  requestSmsCode(input: RequestSmsCodeInput!): SmsCodeResult!
  updateMyUserInfo(input: UpdateMyUserInfoInput!): UserInfoUpdateResult! # @auth(role: CUSTOMER)
  verifyTotp(input: VerifyTotpInput!): TotpVerificationResult! # @auth(role: STAFF)
}

# ─── Actives ───────────────────────────────────────────────────────────────

enum ActiveDateRange {
  TODAY
  WEEK
  MONTH
  YEAR
}

type ActiveRegistration {
  id: ID!
  activeId: ID!
  userId: ID!
  isWatching: Boolean!
  nickname: String
  uid: String
  createdAt: String
}

type Active {
  id: ID!
  creatorId: ID!
  creator: UserProfile
  title: String!
  boardGameId: ID
  boardGame: BoardGameSummary
  boardGames: [BoardGameSummary!]!
  storeId: ID
  date: String!
  time: String
  maxPlayers: Int!
  content: String
  isGame: Boolean!
  isSystemRecommended: Boolean!
  registrations: [ActiveRegistration!]!
  createdAt: String
  updatedAt: String
}

type ActiveListResult {
  items: [Active!]!
  pageInfo: PageInfo!
}

input ActiveListInput {
  pagination: CursorPaginationInput = { limit: 20 }
  showExpired: Boolean = false
  dateRange: ActiveDateRange
  storeId: ID
}

input CreateActiveInput {
  title: String!
  boardGameId: ID
  date: String!
  time: String
  maxPlayers: Int!
  content: String
  isGame: Boolean = true
  storeId: ID
}

input UpdateActiveInput {
  id: ID!
  title: String
  boardGameId: ID
  date: String
  time: String
  maxPlayers: Int
  content: String
  isGame: Boolean
}

input JoinActiveInput {
  activeId: ID!
  isWatching: Boolean = false
}

extend type Query {
  actives(input: ActiveListInput = {}): ActiveListResult!
  active(id: ID!): Active!
  activeParticipants(activeId: ID!): [ActiveRegistration!]! # @auth(role: CUSTOMER)
  managedActives(storeId: ID): [Active!]! # @auth(role: STAFF)
  managedActive(id: ID!): Active! # @auth(role: STAFF)
}

extend type Mutation {
  createActive(input: CreateActiveInput!): Active! # @auth(role: CUSTOMER)
  joinActive(input: JoinActiveInput!): ActiveRegistration! # @auth(role: CUSTOMER)
  leaveActive(activeId: ID!): Active # @auth(role: CUSTOMER)
  updateActive(input: UpdateActiveInput!): Active! # @auth(role: STAFF)
  removeActive(id: ID!): Active! # @auth(role: STAFF)
  removeActiveRegistration(registrationId: ID!): ActiveRegistration! # @auth(role: STAFF)
  batchRemoveActives(ids: [ID!]!): [Active!]! # @auth(role: STAFF)
}

# ─── Tables And Orders ─────────────────────────────────────────────────────

enum TableType {
  FIXED
  SOLO
}

enum TableScope {
  TRPG
  BOARDGAME
  CONSOLE
  MAHJONG
}

enum TableStatus {
  ACTIVE
  INACTIVE
}

enum OrderStatus {
  ACTIVE
  PAUSED
  SETTLED
  CANCELLED
}

enum OrderStatusFilter {
  ALL
  ACTIVE
  PAUSED
  SETTLED
}

enum OrderSortBy {
  START_AT
  END_AT
}

enum OrderGroupBy {
  TABLE
  USER
  DATE
  NONE
}

type TableOccupancy {
  id: ID!
  tableId: ID!
  userId: ID
  tempId: ID
  nickname: String
  uid: String
  phone: String
  seats: Int!
  status: OrderStatus!
  startAt: String!
  endAt: String
  finalPrice: Int
  pricingSnapshotId: ID
  priceBreakdown: String
  settlementSnapshot: String
  table: Table
  user: UserProfile
}

type Table {
  id: ID!
  name: String!
  type: TableType!
  scope: TableScope!
  status: TableStatus!
  capacity: Int!
  code: String!
  description: String
  storeId: ID
  occupancies: [TableOccupancy!]!
  createdAt: String
  updatedAt: String
}

type ActiveOccupancySummary {
  code: String!
  name: String!
  status: OrderStatus!
}

type OccupyTableResult {
  occupancy: TableOccupancy!
  table: Table!
}

type OrderListResult {
  items: [TableOccupancy!]!
  pageInfo: PageInfo!
}

type PriceBreakdown {
  planName: String!
  planType: String!
  billingType: String!
  unitPrice: Int!
  totalMinutes: Int!
  billableHalfHours: Int!
  rawPrice: Int!
  capApplied: Boolean!
  capType: String
  finalPrice: Int!
}

type OrderPauseLogView {
  pausedAt: String!
  resumedAt: String
}

type SettlementMembershipInfo {
  hasTimePlan: Boolean!
  timePlanActive: Boolean!
  timePlanType: String
  timePlanEndDate: String
  storedValueBalance: Int!
}

type StoredValueDeduction {
  deducted: Boolean!
  amount: Int!
  note: String!
  balanceBefore: Int!
  balanceAfter: Int!
}

type PricingPlanMatch {
  name: String!
  planType: String!
  billingType: String!
  price: Int!
  matched: Boolean!
}

type RecentOrder {
  id: ID!
  tableName: String!
  startAt: String!
  endAt: String
  finalPrice: Int
  status: OrderStatus!
}

type SettlementPreview {
  order: TableOccupancy!
  totalMinutes: Int!
  pausedMinutes: Int!
  billableMinutes: Int!
  finalPrice: Int!
  priceBreakdown: PriceBreakdown
  membership: SettlementMembershipInfo!
  pauseLogs: [OrderPauseLogView!]!
  pricingPlans: [PricingPlanMatch!]!
  recentOrders: [RecentOrder!]!
}

type SettlementResult {
  order: TableOccupancy!
  price: Int!
  snapshot: String
  storedValueDeduction: StoredValueDeduction
}

type BatchOrderResult {
  id: ID!
  order: TableOccupancy
  success: Boolean!
  price: Int
  restored: Boolean
  error: String
}

type BatchSettlementResult {
  batchId: ID
  results: [BatchOrderResult!]!
}

type OrphanedOrderInfo {
  id: ID!
  tableId: ID!
  status: OrderStatus!
  userId: ID
  tempId: ID
}

type CleanupOrphanedDataResult {
  dryRun: Boolean!
  totalOccupancies: Int!
  orphanedOccupancies: Int!
  activeOrphans: [OrphanedOrderInfo!]!
  endedOrphans: Int!
  orphanedPauseLogs: Int!
  danglingPauseLogs: Int!
  actions: [String!]!
}

input CreateTableInput {
  name: String!
  type: TableType!
  scope: TableScope!
  capacity: Int
  description: String
  storeId: ID
}

input UpdateTableInput {
  id: ID!
  name: String
  type: TableType
  scope: TableScope
  capacity: Int
  description: String
}

input OccupyTableInput {
  code: String!
}

input LeaveTableInput {
  occupancyId: ID!
  code: String!
}

input AddOccupancyInput {
  tableId: ID!
  userId: ID!
}

input OrderListInput {
  search: String
  status: OrderStatusFilter = ALL
  sortBy: OrderSortBy = START_AT
  sortOrder: SortOrder = DESC
  groupBy: OrderGroupBy = NONE
  pagination: PaginationInput = { offset: 0, limit: 50 }
  storeId: ID
}

input SettleOrderInput {
  id: ID!
  deductFromStoredValue: Boolean = false
}

input BatchSettleInput {
  ids: [ID!]!
  deductFromStoredValue: Boolean = false
}

extend type Query {
  tableByCode(code: String!, storeId: ID): Table!
  myActiveOccupancies(storeId: ID): [ActiveOccupancySummary!]! # @auth(role: CUSTOMER)
  managedTables(storeId: ID): [Table!]! # @auth(role: STAFF)
  managedTable(id: ID!): Table! # @auth(role: STAFF)
  managedTableByCode(code: String!, storeId: ID): Table! # @auth(role: STAFF)
  occupanciesByUser(userId: ID!): [TableOccupancy!]! # @auth(role: STAFF)
  orders(input: OrderListInput = {}): OrderListResult! # @auth(role: STAFF)
  order(id: ID!): TableOccupancy! # @auth(role: STAFF)
  settlementPreview(id: ID!): SettlementPreview! # @auth(role: STAFF)
}

extend type Mutation {
  occupyTable(input: OccupyTableInput!): OccupyTableResult! # @auth(role: CUSTOMER)
  leaveTable(input: LeaveTableInput!): TableOccupancy! # @auth(role: CUSTOMER)
  pauseMyOrder(input: LeaveTableInput!): TableOccupancy! # @auth(role: CUSTOMER)
  createTable(input: CreateTableInput!): Table! # @auth(role: STAFF)
  updateTable(input: UpdateTableInput!): Table! # @auth(role: STAFF)
  toggleTableStatus(id: ID!): Table! # @auth(role: STAFF)
  removeTable(id: ID!): Table! # @auth(role: STAFF)
  regenerateTableCode(id: ID!): Table! # @auth(role: STAFF)
  addTableOccupancy(input: AddOccupancyInput!): TableOccupancy! # @auth(role: STAFF)
  removeTableOccupancy(id: ID!): TableOccupancy! # @auth(role: STAFF)
  endOrder(id: ID!): TableOccupancy! # @auth(role: STAFF)
  pauseOrder(id: ID!): TableOccupancy! # @auth(role: STAFF)
  resumeOrder(id: ID!): TableOccupancy! # @auth(role: STAFF)
  settleOrder(input: SettleOrderInput!): SettlementResult! # @auth(role: STAFF)
  batchPauseOrders(ids: [ID!]!): [BatchOrderResult!]! # @auth(role: STAFF)
  batchResumeOrders(ids: [ID!]!): [BatchOrderResult!]! # @auth(role: STAFF)
  batchSettlementPreview(ids: [ID!]!): [SettlementPreview!]! # @auth(role: STAFF)
  batchSettleOrders(input: BatchSettleInput!): BatchSettlementResult! # @auth(role: STAFF)
  cancelBatchSettlement(ids: [ID!]!): [BatchOrderResult!]! # @auth(role: STAFF)
  cleanupOrphanedOrders(dryRun: Boolean = true): CleanupOrphanedDataResult! # @auth(role: STAFF)
}

# ─── Temp Identity ─────────────────────────────────────────────────────────

type TempIdentity {
  id: ID!
  nickname: String!
  totpSecret: String!
  expiresAt: String!
  valid: Boolean!
}

type TempIdentityTransferResult {
  transferred: Boolean!
  occupancy: TableOccupancy
}

input TempIdentityOccupyInput {
  tempId: ID!
  code: String!
}

input TempIdentityLeaveInput {
  tempId: ID!
  occupancyId: ID!
  code: String!
}

extend type Query {
  validateTempIdentity(tempId: ID!): TempIdentity!
  tempIdentityActiveOccupancies(tempId: ID!): [ActiveOccupancySummary!]!
}

extend type Mutation {
  createTempIdentity: TempIdentity!
  occupyTableWithTempIdentity(input: TempIdentityOccupyInput!): OccupyTableResult!
  leaveTableWithTempIdentity(input: TempIdentityLeaveInput!): SettlementResult!
  transferTempIdentity(tempId: ID!, userId: ID!): TempIdentityTransferResult!
}

