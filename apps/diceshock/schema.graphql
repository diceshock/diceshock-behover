  computedAt: String
}

type LeaderboardCategoryInfo {
  key: LeaderboardCategory!
  label: String!
}

type RankingSummary {
  category: LeaderboardCategory!
  period: LeaderboardPeriod!
  rank: Int
  totalPP: Float!
  prevRank: Int
  matchCount: Int!
}

type UserBadge {
  id: ID!
  userId: ID
  badgeType: String!
  badgeRank: Int!
  category: String!
  periodLabel: String!
  title: String!
  awardedAt: String
  createdAt: String
}

type PPStats {
  totalPP: Float!
  categories: String!
  raw: String!
}

extend type Query {
  leaderboard(category: LeaderboardCategory!, period: LeaderboardPeriod!, storeId: ID): Leaderboard!
  leaderboardCategories: [LeaderboardCategoryInfo!]!
  myRankings(storeId: ID): [RankingSummary!]! # @auth(role: CUSTOMER)
  myBadges(storeId: ID): [UserBadge!]! # @auth(role: CUSTOMER)
  userBadges(userId: ID!, storeId: ID): [UserBadge!]!
  myPPStats(storeId: ID): PPStats! # @auth(role: CUSTOMER)
}

