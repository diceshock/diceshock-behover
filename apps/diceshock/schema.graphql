# ─── Leaderboards And Badges ───────────────────────────────────────────────

enum LeaderboardCategory {
  TOURNAMENT
  STORE_4P_HANCHAN
  STORE_4P_TONPUU
  STORE_3P_HANCHAN
  STORE_3P_TONPUU
}

enum LeaderboardPeriod {
  DAY
  WEEK
  MONTH
}

type LeaderboardEntry {
  userId: ID!
  nickname: String!
  totalPP: Float!
  matchCount: Int!
  rank: Int!
  prevRank: Int
}

type Leaderboard {
  category: LeaderboardCategory!
  period: LeaderboardPeriod!
