# ─── Subscriptions ─────────────────────────────────────────────────────────

type SeatUpdatePayload {
  tableCode: String!
  table: Table!
  occupancies: [TableOccupancy!]!
  updatedAt: String!
}

type ActiveParticipantsChangedPayload {
  active: Active!
  participants: [ActiveRegistration!]!
  updatedAt: String!
}

type NotificationPayload {
  id: ID!
  userId: ID!
  type: String!
  data: String!
  createdAt: String!
}

type LeaderboardUpdatedPayload {
  leaderboard: Leaderboard!
  updatedAt: String!
}

type OrderStatusChangedPayload {
  order: TableOccupancy!
  previousStatus: OrderStatus
  currentStatus: OrderStatus!
  updatedAt: String!
}

extend type Subscription {
  seatUpdated(tableCode: String, storeId: ID): SeatUpdatePayload!
  activeParticipantsChanged(activeId: ID, storeId: ID): ActiveParticipantsChangedPayload!
  notificationReceived(userId: ID!): NotificationPayload! # @auth(role: CUSTOMER)
  leaderboardUpdated(category: LeaderboardCategory, period: LeaderboardPeriod, storeId: ID): LeaderboardUpdatedPayload!
  orderStatusChanged(orderId: ID, tableId: ID, storeId: ID): OrderStatusChangedPayload! # @auth(role: STAFF)
}
