# ─── GSZ And Mahjong ───────────────────────────────────────────────────────

enum MahjongMatchType {
  STORE
  TOURNAMENT
}

enum MahjongMode {
  THREE_PLAYER
  FOUR_PLAYER
}

enum MahjongFormat {
  TONPUU
  HANCHAN
}

enum MahjongTerminationReason {
  SCORE_COMPLETE
  VOTE
  ADMIN_ABORT
  ORDER_INVALID
}

enum MahjongCompletionFilter {
  ALL
  COMPLETED
  INCOMPLETE
}

enum GszSyncFilter {
  ALL
  SYNCED
  UNSYNCED
}

enum UnsyncableReasonCode {
  NO_PHONE
  TEMP_USER
}

type MahjongPlayer {
  userId: ID!
  nickname: String!
  seat: String
  finalScore: Int!
  currentPoints: Int
}

input MahjongPlayerInput {
  userId: ID!
  nickname: String!
  seat: String
  finalScore: Int!
}

type MahjongConfig {
  type: String
  mode: String!
  format: String!
}

input MahjongConfigInput {
  type: String!
  mode: String!
  format: String!
}

type UnsyncableReason {
  nickname: String!
  userId: ID!
  reason: UnsyncableReasonCode!
}

type MahjongMatch {
  id: ID!
  tableId: ID
  table: Table
  matchType: MahjongMatchType
  gszRecordId: Int
  gszSynced: Boolean!
  gszError: String
  gszSyncedAt: String
  mode: MahjongMode!
  format: MahjongFormat!
  startedAt: String!
  endedAt: String!
  terminationReason: MahjongTerminationReason!
  players: [MahjongPlayer!]!
  playersJson: String!
  scores: String
  config: MahjongConfig
  createdAt: String
  unsyncableReasons: [UnsyncableReason!]!
}

type MahjongMatchListResult {
  items: [MahjongMatch!]!
  pageInfo: PageInfo!
}

type MahjongRegistrationStatus {
  hasPhone: Boolean!
  phone: String
  nickname: String
  registered: Boolean!
  gszName: String
  gszId: Int
  gszSynced: Boolean!
  gszError: String
